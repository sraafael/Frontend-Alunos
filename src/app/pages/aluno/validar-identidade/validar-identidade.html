<div class="validar-container">
  <div class="card">
    <h2>Identifique-se</h2>
    <p>Informe seu nome e sobrenome para entrar na sessão.</p>
    
    <input type="text" [(ngModel)]="nome" placeholder="Nome" class="input-field" />
    <input type="text" [(ngModel)]="sobrenome" placeholder="Sobrenome" class="input-field" />
    
    <p *ngIf="erro" class="error-msg" style="color: red; font-size: 14px; margin-bottom: 10px;">{{ erro }}</p>

    <button (click)="entrar()" class="btn btn-entrar" [disabled]="isLoading || !hashSessao">
      {{ isLoading ? 'Carregando...' : 'Entrar' }}
    </button>
  </div>
</div>
