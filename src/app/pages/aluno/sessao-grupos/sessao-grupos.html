<div class="sessao-container">
  <h2>Grupos Disponíveis</h2>
  <p>Selecione um grupo para participar da atividade.</p>

  <div *ngIf="isLoading" style="text-align: center; margin: 20px 0;">
    <p>Carregando grupos...</p>
  </div>

  <div class="grupos-list" *ngIf="!isLoading">
    <div class="grupo-card" *ngFor="let grupo of grupos">
      <h3>{{ grupo.nomeGrupo }}</h3>
      <p>Capacidade: {{ grupo.usuarios.length }} / {{ grupo.capacidade }}</p>
      
      <ul class="alunos-list">
        <li *ngFor="let usuario of grupo.usuarios">
          👤 {{ usuario.nome }}
        </li>
      </ul>

      <button 
        class="btn btn-entrar" 
        (click)="entrarGrupo(grupo.idGrupo)" 
        [disabled]="grupo.usuarios.length >= grupo.capacidade || carregandoGrupoId !== null">
        {{ carregandoGrupoId === grupo.idGrupo ? 'Entrando...' : 'Entrar no Grupo' }}
      </button>
    </div>
  </div>
</div>
